name: 每日資料清理

on:
  schedule:
    # 每日 UTC 02:00 執行
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    name: 清理過期資料
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Run cleanup
        working-directory: webapp
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run cleanup
