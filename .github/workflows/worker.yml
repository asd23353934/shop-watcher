# GitHub Actions Worker — 定時執行一次掃描循環
# 每小時整點觸發，抓取各販售平台最新商品並通知用戶
name: Worker Scan

on:
  schedule:
    - cron: '0 * * * *'   # 每小時執行一次
  workflow_dispatch:           # 支援手動觸發

# 防止上一輪 job 尚未結束時下一輪重疊啟動
# cancel-in-progress: false 確保正在執行的掃描不被取消
concurrency:
  group: worker-scan
  cancel-in-progress: false

jobs:
  scan:
    name: 執行掃描
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安裝 Python 依賴
        run: pip install -r requirements.txt

      - name: 安裝 Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: 還原 Shopee session 快取
        uses: actions/cache@v4
        with:
          path: shopee_storage_state.json
          key: shopee-storage-state-${{ github.run_id }}
          restore-keys: shopee-storage-state-

      - name: 執行單次掃描
        env:
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # 可選：蝦皮 session cookies（JSON 陣列格式）用於繞過 fraud detection
          # 從真實 Chrome 匯出 shopee.tw cookies 後存入此 secret
          SHOPEE_COOKIES_JSON: ${{ secrets.SHOPEE_COOKIES_JSON }}
          # 可選：爬取失敗時的 Discord Webhook 通知（逐筆爬取錯誤）
          DISCORD_ERROR_WEBHOOK: ${{ secrets.DISCORD_ERROR_WEBHOOK }}
          # 可選：開發者專用系統告警 Webhook（逾時、嚴重錯誤）
          SYSTEM_ALERT_WEBHOOK: ${{ secrets.SYSTEM_ALERT_WEBHOOK }}
        run: python run_once.py

      - name: 通知 Discord（workflow 失敗或逾時時）
        # failure() 捕捉 job crash；cancelled() 捕捉 GitHub Actions timeout / 手動取消
        if: failure() || cancelled()
        env:
          DISCORD_ERROR_WEBHOOK: ${{ secrets.DISCORD_ERROR_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_ERROR_WEBHOOK" ]; then
            echo "DISCORD_ERROR_WEBHOOK 未設定，跳過通知"
            exit 0
          fi

          # 判斷是逾時/取消還是崩潰
          if [ "${{ job.status }}" = "cancelled" ]; then
            TITLE="⏱ Worker 掃描逾時或取消"
            DESC="Worker Scan workflow 被取消（通常為 timeout-minutes 觸發或手動取消）"
          else
            TITLE="⚠️ Worker 掃描失敗"
            DESC="Worker Scan workflow 執行失敗（含 import crash、安裝錯誤等）"
          fi

          curl -s -X POST "$DISCORD_ERROR_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": 16711680,
                \"description\": \"$DESC\",
                \"fields\": [
                  {\"name\": \"Run\", \"value\": \"${{ github.run_number }}\", \"inline\": true},
                  {\"name\": \"Trigger\", \"value\": \"${{ github.event_name }}\", \"inline\": true},
                  {\"name\": \"Status\", \"value\": \"${{ job.status }}\", \"inline\": true}
                ]
              }]
            }"
