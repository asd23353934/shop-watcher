# GitHub Actions Worker — 定時執行一次掃描循環
# 每 10 分鐘觸發，抓取蝦皮與露天最新商品並通知用戶
name: Worker Scan

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分鐘執行一次
  workflow_dispatch:           # 支援手動觸發

jobs:
  scan:
    name: 執行掃描
    runs-on: ubuntu-22.04
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 安裝 Python 依賴
        run: pip install -r requirements.txt

      - name: 安裝 Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: 執行單次掃描
        env:
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # 可選：蝦皮 session cookies（JSON 陣列格式）用於繞過 fraud detection
          # 從真實 Chrome 匯出 shopee.tw cookies 後存入此 secret
          SHOPEE_COOKIES_JSON: ${{ secrets.SHOPEE_COOKIES_JSON }}
          # 可選：爬取失敗時的 Discord Webhook 通知
          DISCORD_ERROR_WEBHOOK: ${{ secrets.DISCORD_ERROR_WEBHOOK }}
        run: python run_once.py

      - name: 通知 Discord（workflow 失敗時）
        if: failure()
        env:
          DISCORD_ERROR_WEBHOOK: ${{ secrets.DISCORD_ERROR_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_ERROR_WEBHOOK" ]; then
            echo "DISCORD_ERROR_WEBHOOK 未設定，跳過通知"
            exit 0
          fi
          curl -s -X POST "$DISCORD_ERROR_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "⚠️ Worker 掃描失敗",
                "color": 16711680,
                "description": "Worker Scan workflow 執行失敗（含 import crash、安裝錯誤等）",
                "fields": [
                  {"name": "Run", "value": "${{ github.run_number }}", "inline": true},
                  {"name": "Trigger", "value": "${{ github.event_name }}", "inline": true}
                ]
              }]
            }'
