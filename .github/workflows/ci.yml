# GitHub Actions CI pipeline runs lint on every push
# GitHub Actions CD pipeline deploys to Fly.io on main branch
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Run flake8
        run: flake8 src/ main.py --max-line-length=120

  webapp-check:
    name: Webapp Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Run ESLint
        working-directory: webapp
        run: npm run lint

      - name: TypeScript build check
        working-directory: webapp
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [lint, webapp-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
