# Shop Watcher Configuration
# Copy to config.yaml and adjust as needed

check_interval: 300  # seconds between each full scan (5 minutes)

discord:
  webhook_url: ""  # or set via DISCORD_WEBHOOK_URL env var
  mention_role_id: ""  # optional: role ID to @mention on new items (leave empty to disable)

keywords:
  - name: "PS5"
    platforms:
      - shopee
      - ruten
    min_price: null   # TWD, null = no limit
    max_price: 15000  # TWD, null = no limit

  - name: "Nintendo Switch"
    platforms:
      - shopee
    min_price: null
    max_price: 8000

  - name: "RTX 4090"
    platforms:
      - shopee
      - ruten
    min_price: null
    max_price: null
